[package]
name = "const_shader_layout"
version = "0.1.0"
edition = "2024"
description = "Compile-time checks for whether structs conform to WGSL's memory layout rules"
repository = "https://github.com/beicause/const_shader_layout"
license = "MIT OR Apache-2.0"
keywords = ["const", "macro", "shader", "wgsl"]
exclude = [".github"]

[dependencies]
glam = {
  version = "0.33.2",
  default-features = false,
  features = ["i16", "i32", "std", "u16", "u32"]
}
half = { version = "2.7.1", default-features = false }

[dev-dependencies]
trybuild = { version = "1.0.118", default-features = false }
